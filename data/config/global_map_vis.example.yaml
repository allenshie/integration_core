# Global map visualization example
#
# Copy this file to `data/config/global_map_visualization.yaml` or set
# GLOBAL_MAP_VIS_CONFIG_PATH to point at your own visualization config.

map:
  image_path: data/assets/global_map.png
  width_meters: 120.0
  height_meters: 60.0

render:
  mode: write
  output_dir: output/global_map
  window_name: global-map
  marker_radius: 6
  label_font_scale: 0.5
  label_thickness: 1
  show_global_id: true
  show_class_name: false
  show_legend: true
  global_radius_ratio: 0.008
  local_radius_ratio: 0.004

cameras:
  - camera_id: cam01
    display_name: Camera 1
    aliases:
      - cam01
      - edge_cam01
  - camera_id: cam02
    display_name: Camera 2
    aliases:
      - cam02
      - edge_cam02
